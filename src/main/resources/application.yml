spring:
  application:
    name: spring-playground
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_playground}
    username: ${DB_USERNAME:spring}
    password: ${DB_PASSWORD:spring}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
