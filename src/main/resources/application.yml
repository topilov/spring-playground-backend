spring:
  application:
    name: spring-playground
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  data:
    redis:
      url: ${REDIS_URL:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

app:
  turnstile:
    enabled: ${APP_TURNSTILE_ENABLED:true}
    secret-key: ${APP_TURNSTILE_SECRET_KEY:}
    siteverify-url: ${APP_TURNSTILE_SITEVERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
    expected-hostname: ${APP_TURNSTILE_EXPECTED_HOSTNAME:}
    timeout: ${APP_TURNSTILE_TIMEOUT:PT3S}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://auth.topilov.dev}
  abuse:
    flows:
      register:
        captcha-required: true
        request-limit: 5
        request-window: PT5M
      login:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      forgot-password:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
        cooldown: PT2M
      resend-verification-email:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
        cooldown: PT2M
      reset-password:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
      two-factor-login:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      passkey-login-options:
        captcha-required: true
        request-limit: 15
        request-window: PT5M
      passkey-login-verify:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
      verify-email-change:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
  passkeys:
    rp-id: ${APP_PASSKEY_RP_ID:auth.topilov.dev}
    rp-name: ${APP_PASSKEY_RP_NAME:Spring Playground}
    origins: ${APP_PASSKEY_ORIGINS:https://auth.topilov.dev}
    ceremony-ttl: ${APP_PASSKEY_CEREMONY_TTL:PT5M}
  two-factor:
    issuer: ${APP_TWO_FACTOR_ISSUER:Spring Playground}
    login-challenge-ttl: ${APP_TWO_FACTOR_LOGIN_CHALLENGE_TTL:PT5M}
    encryption-key-base64: ${APP_TWO_FACTOR_ENCRYPTION_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    backup-code-count: ${APP_TWO_FACTOR_BACKUP_CODE_COUNT:10}
  mail:
    enabled: true
    api-key: ${RESEND_API_KEY}
    from: ${MAIL_FROM}
    app-name: ${MAIL_APP_NAME:Spring Playground}
    public-base-url: ${APP_PUBLIC_BASE_URL:https://auth.topilov.dev}
    verify-email-path: ${APP_VERIFY_EMAIL_PATH:/verify-email}
    verify-email-change-path: ${APP_VERIFY_EMAIL_CHANGE_PATH:/verify-email-change}
    email-verification-ttl: ${APP_EMAIL_VERIFICATION_TTL:PT24H}
    reset-password-path: ${APP_RESET_PASSWORD_PATH:/reset-password}
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT30M}
