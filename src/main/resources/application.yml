spring:
  application:
    name: spring-playground
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL_ENABLE:false}
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  data:
    redis:
      url: ${REDIS_URL:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://topilov.dev}
  passkeys:
    rp-id: ${APP_PASSKEY_RP_ID:topilov.dev}
    rp-name: ${APP_PASSKEY_RP_NAME:Spring Playground}
    origins: ${APP_PASSKEY_ORIGINS:https://topilov.dev}
    ceremony-ttl: ${APP_PASSKEY_CEREMONY_TTL:PT5M}
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
    app-name: ${MAIL_APP_NAME:Spring Playground}
    public-base-url: ${APP_PUBLIC_BASE_URL:https://topilov.dev}
    verify-email-path: ${APP_VERIFY_EMAIL_PATH:/verify-email}
    email-verification-ttl: ${APP_EMAIL_VERIFICATION_TTL:PT24H}
    reset-password-path: ${APP_RESET_PASSWORD_PATH:/reset-password}
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT30M}
