spring:
  application:
    name: spring-playground
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_playground}
    username: ${DB_USERNAME:spring}
    password: ${DB_PASSWORD:spring}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

app:
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
    app-name: ${MAIL_APP_NAME:Spring Playground}
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
    reset-password-path: ${APP_RESET_PASSWORD_PATH:/reset-password}
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT30M}
