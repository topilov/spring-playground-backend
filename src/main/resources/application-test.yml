spring:
  jpa:
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      url: redis://localhost:6379

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

server:
  servlet:
    session:
      cookie:
        secure: false
        same-site: lax

app:
  turnstile:
    enabled: true
    secret-key: test-secret
    expected-hostname:
    timeout: PT1S
  cors:
    allowed-origins: http://localhost:3000
  abuse:
    flows:
      register:
        captcha-required: true
        request-limit: 50
        request-window: PT5M
      login:
        captcha-required: true
        request-limit: 50
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      forgot-password:
        captcha-required: true
        request-limit: 50
        request-window: PT10M
        cooldown: PT10M
      resend-verification-email:
        captcha-required: true
        request-limit: 50
        request-window: PT10M
        cooldown: PT10M
      reset-password:
        captcha-required: true
        request-limit: 50
        request-window: PT10M
      two-factor-login:
        captcha-required: true
        request-limit: 50
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      passkey-login-options:
        captcha-required: true
        request-limit: 50
        request-window: PT5M
      passkey-login-verify:
        captcha-required: true
        request-limit: 50
        request-window: PT5M
      verify-email-change:
        captcha-required: true
        request-limit: 50
        request-window: PT10M
      telegram-focus-update:
        captcha-required: false
        request-limit: 200
        request-window: PT1M
  passkeys:
    rp-id: localhost
    rp-name: Spring Playground Test
    origins: http://localhost:3000
    ceremony-ttl: PT5M
  two-factor:
    issuer: Spring Playground Test
    login-challenge-ttl: PT5M
    encryption-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    backup-code-count: 10
  mail:
    enabled: false
    from: test-no-reply@example.com
    app-name: Spring Playground Test
    public-base-url: http://localhost:3000
    verify-email-path: /verify-email
    verify-email-change-path: /verify-email-change
    email-verification-ttl: PT24H
    reset-password-path: /reset-password
    password-reset-ttl: PT30M
  telegram:
    enabled: false
    api-id: 0
    api-hash:
    session-root: build/test-telegram-sessions
    pending-auth-ttl: PT10M
    automation-token-bytes: 32
    encryption-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    default-focus-mappings:
      personal: 5368324170671202286
      airplane: 5368324170671202290
      do-not-disturb: 5368324170671202295
      reduce-interruptions: 5368324170671202300
      sleep: 5368324170671202305
