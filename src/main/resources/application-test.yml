spring:
  jpa:
    show-sql: false
  flyway:
    enabled: true
  mail:
    host: localhost
    port: 2525

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

server:
  servlet:
    session:
      cookie:
        secure: false

app:
  passkeys:
    rp-id: localhost
    rp-name: Spring Playground Test
    origins: http://localhost:3000,http://localhost:4173,http://localhost:5173
    ceremony-ttl: PT5M
  mail:
    from: test-no-reply@example.com
    app-name: Spring Playground Test
    public-base-url: http://localhost:3000
    verify-email-path: /verify-email
    email-verification-ttl: PT24H
    reset-password-path: /reset-password
    password-reset-ttl: PT30M
