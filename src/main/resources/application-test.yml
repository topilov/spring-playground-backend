spring:
  jpa:
    show-sql: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:2525}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

server:
  servlet:
    session:
      cookie:
        secure: false
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  passkeys:
    rp-id: ${APP_PASSKEY_RP_ID:localhost}
    rp-name: ${APP_PASSKEY_RP_NAME:Spring Playground Test}
    origins: ${APP_PASSKEY_ORIGINS:http://localhost:5173}
    ceremony-ttl: ${APP_PASSKEY_CEREMONY_TTL:PT5M}
  mail:
    from: ${MAIL_FROM:test-no-reply@example.com}
    app-name: ${MAIL_APP_NAME:Spring Playground Test}
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
    verify-email-path: ${APP_VERIFY_EMAIL_PATH:/verify-email}
    email-verification-ttl: ${APP_EMAIL_VERIFICATION_TTL:PT24H}
    reset-password-path: ${APP_RESET_PASSWORD_PATH:/reset-password}
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT30M}
