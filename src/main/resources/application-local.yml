spring:
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_playground}
    username: ${DB_USERNAME:spring}
    password: ${DB_PASSWORD:spring}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  servlet:
    session:
      cookie:
        secure: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  passkeys:
    rp-id: ${APP_PASSKEY_RP_ID:localhost}
    origins: ${APP_PASSKEY_ORIGINS:http://localhost:5173}
  mail:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
