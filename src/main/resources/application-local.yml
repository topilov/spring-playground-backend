spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_playground
    username: spring
    password: spring
  data:
    redis:
      url: redis://localhost:6379

server:
  servlet:
    session:
      cookie:
        secure: false

app:
  turnstile:
    enabled: ${APP_TURNSTILE_ENABLED:false}
    secret-key: ${APP_TURNSTILE_SECRET_KEY:}
    expected-hostname: ${APP_TURNSTILE_EXPECTED_HOSTNAME:localhost}
    timeout: ${APP_TURNSTILE_TIMEOUT:PT3S}
  cors:
    allowed-origins: http://localhost:3000
  abuse:
    flows:
      register:
        captcha-required: true
        request-limit: 10
        request-window: PT5M
      login:
        captcha-required: true
        request-limit: 30
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      forgot-password:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
        cooldown: PT2M
      resend-verification-email:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
        cooldown: PT2M
      reset-password:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
      two-factor-login:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
        failure-limit: 5
        failure-window: PT10M
      passkey-login-options:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
      passkey-login-verify:
        captcha-required: true
        request-limit: 20
        request-window: PT5M
      verify-email-change:
        captcha-required: true
        request-limit: 10
        request-window: PT10M
  passkeys:
    rp-id: localhost
    origins: http://localhost:3000
  mail:
    enabled: true
    api-key: ${RESEND_API_KEY}
    from: no-reply@topilov.dev
    app-name: Spring Playground
    verify-email-path: /verify-email
    verify-email-change-path: /verify-email-change
    email-verification-ttl: PT5M
    reset-password-path: /reset-password
    password-reset-ttl: PT5M
    public-base-url: http://localhost:3000
