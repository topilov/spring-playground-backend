openapi: 3.1.0
info:
  title: Spring Playground Backend API
  description: Session-based auth/profile/public HTTP API. This OpenAPI schema is
    the machine-readable contract for frontend integration. Browser clients should
    send credentialed requests so the JSESSIONID session cookie is stored and resent.
  version: 0.0.1-SNAPSHOT
tags:
- name: Auth
  description: Session-based authentication endpoints.
- name: Public
  description: Unauthenticated public endpoints.
- name: Profile
  description: Authenticated profile endpoints.
paths:
  /api/profile/me:
    get:
      tags:
      - Profile
      summary: Get current profile
      description: Returns the profile linked to the current authenticated session.
      operationId: currentProfile
      responses:
        "200":
          description: Current profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Authenticated user has no linked profile.
      security:
      - sessionCookie: []
    put:
      tags:
      - Profile
      summary: Update current profile
      description: Updates the profile linked to the current authenticated session.
      operationId: updateCurrentProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "400":
          description: Validation failed for the submitted profile payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "200":
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Authenticated user has no linked profile.
      security:
      - sessionCookie: []
  /api/profile/me/username:
    post:
      tags:
      - Profile
      summary: Update current username
      description: Updates the username of the current authenticated user.
      operationId: updateUsername
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameRequest"
        required: true
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Validation failed for the submitted username payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Authenticated user has no linked profile.
        "409":
          description: Username is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
      security:
      - sessionCookie: []
  /api/profile/me/password:
    post:
      tags:
      - Profile
      summary: Change current password
      description: Changes the password of the current authenticated user after verifying the current password.
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          description: Validation failed or the current password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Authenticated user has no linked profile.
      security:
      - sessionCookie: []
  /api/profile/me/email/change-request:
    post:
      tags:
      - Profile
      summary: Request current email change
      description: Starts a new email change flow for the current authenticated user and sends a verification link to the new email address.
      operationId: requestEmailChange
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestEmailChangeRequest"
        required: true
      responses:
        "200":
          description: Email change request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestEmailChangeResponse"
        "400":
          description: Validation failed or the new email matches the current email.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Authenticated user has no linked profile.
        "409":
          description: Email is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
      security:
      - sessionCookie: []
  /api/profile/me/email/verify:
    post:
      tags:
      - Profile
      summary: Verify current email change
      description: Confirms an email change using a one-time token that was sent to the new email address.
      operationId: verifyEmailChange
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailChangeRequest"
        required: true
      responses:
        "200":
          description: Email change completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Validation failed or the email change token is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Authenticated user has no linked profile.
        "409":
          description: Email is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
  /api/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset password
      description: Resets a password using a valid one-time reset token.
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "400":
          description: Validation failed or the reset token is invalid or expired.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/ApiErrorResponse"
                - $ref: "#/components/schemas/SimpleErrorResponse"
        "200":
          description: Password reset completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
  /api/auth/register:
    post:
      tags:
      - Auth
      summary: Register
      description: "Creates a new user account and default profile, then sends an\
        \ email verification link when mail delivery succeeds."
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "409":
          description: Username or email is already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
        "400":
          description: Validation failed for the submitted registration payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "200":
          description: Successful registration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
  /api/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify email
      description: Confirms a user email using a token that was previously sent by
        email.
      operationId: verifyEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
        required: true
      responses:
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Verification token is invalid or expired.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Email verification completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailResponse"
  /api/auth/resend-verification-email:
    post:
      tags:
      - Auth
      summary: Resend verification email
      description: Accepts an email address and sends a fresh verification link when
        the account exists and is not yet verified. The response is still accepted
        when the account is missing or already verified.
      operationId: resendVerificationEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationEmailRequest"
        required: true
      responses:
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationEmailResponse"
  /api/auth/logout:
    post:
      tags:
      - Auth
      summary: Logout
      description: Invalidates the current server-side session. The endpoint returns
        204 even when no active session exists.
      operationId: logout
      responses:
        "204":
          description: Logout completed.
  /api/auth/login:
    post:
      tags:
      - Auth
      summary: Login
      description: Authenticates by username or email and creates a server-side session
        backed by the JSESSIONID cookie. Browser-based cross-origin clients must
        send the request with credentials enabled.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "400":
          description: Validation failed for the submitted login payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "200":
          description: Successful login. The response body describes the authenticated
            user and the response sets JSESSIONID.
          headers:
            Access-Control-Allow-Origin:
              description: Returned for allowed browser origins on cross-origin requests.
              schema:
                type: string
            Access-Control-Allow-Credentials:
              description: Returned as true for allowed browser origins so the session
                cookie can be stored by the client.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "202":
          description: Password verification succeeded but the account requires a
            second factor before the authenticated session is created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorLoginChallengeResponse"
        "401":
          description: Invalid credentials, rejected login request, or email is not
            yet verified.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/2fa/status:
    get:
      tags:
      - Auth
      summary: Get 2FA status
      description: Returns the authenticated user's current TOTP two-factor state.
      operationId: getTwoFactorStatus
      responses:
        "200":
          description: Current TOTP state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorStatusResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
      security:
      - sessionCookie: []
  /api/auth/2fa/setup/start:
    post:
      tags:
      - Auth
      summary: Start TOTP setup
      description: Starts or restarts authenticated TOTP setup and returns the temporary setup secret.
      operationId: startTwoFactorSetup
      responses:
        "200":
          description: TOTP setup payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetupStartResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "409":
          description: TOTP 2FA is already enabled for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
      security:
      - sessionCookie: []
  /api/auth/2fa/setup/confirm:
    post:
      tags:
      - Auth
      summary: Confirm TOTP setup
      description: Verifies a TOTP code against the pending setup secret and enables 2FA.
      operationId: confirmTwoFactorSetup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorSetupConfirmRequest"
        required: true
      responses:
        "200":
          description: TOTP was enabled and backup codes were issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetupConfirmResponse"
        "400":
          description: Setup was not started or the confirmation code is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "409":
          description: TOTP 2FA is already enabled for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
      security:
      - sessionCookie: []
  /api/auth/2fa/backup-codes/regenerate:
    post:
      tags:
      - Auth
      summary: Regenerate backup codes
      description: Replaces every active backup code for the authenticated user with a fresh set.
      operationId: regenerateTwoFactorBackupCodes
      responses:
        "200":
          description: Fresh backup codes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateBackupCodesResponse"
        "400":
          description: TOTP 2FA is not enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
      security:
      - sessionCookie: []
  /api/auth/2fa/disable:
    post:
      tags:
      - Auth
      summary: Disable TOTP 2FA
      description: Disables TOTP 2FA for the authenticated user and removes stored backup codes.
      operationId: disableTwoFactor
      responses:
        "200":
          description: TOTP 2FA was disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableTwoFactorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
      security:
      - sessionCookie: []
  /api/auth/2fa/login/verify:
    post:
      tags:
      - Auth
      summary: Finish password login with TOTP
      description: Verifies a TOTP code against a one-time login challenge and creates the normal authenticated session.
      operationId: finishTwoFactorLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorLoginVerifyRequest"
        required: true
      responses:
        "200":
          description: Successful 2FA login. The response body and session cookie behavior match password login.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Login challenge is invalid, expired, or already consumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Second-factor verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/2fa/login/verify-backup-code:
    post:
      tags:
      - Auth
      summary: Finish password login with a backup code
      description: Verifies a backup code against a one-time login challenge and creates the normal authenticated session.
      operationId: finishTwoFactorBackupCodeLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorBackupCodeLoginVerifyRequest"
        required: true
      responses:
        "200":
          description: Successful 2FA login. The response body and session cookie behavior match password login.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Login challenge is invalid, expired, or already consumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Backup code verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/passkeys/register/options:
    post:
      tags:
      - Auth
      summary: Start passkey registration
      description: Starts WebAuthn registration for the current authenticated user.
      operationId: startRegistration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegistrationOptionsRequest"
        required: true
      responses:
        "200":
          description: Passkey registration options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyRegistrationOptionsResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
      security:
      - sessionCookie: []
  /api/auth/passkeys/register/verify:
    post:
      tags:
      - Auth
      summary: Finish passkey registration
      description: Verifies a WebAuthn registration response and persists the passkey.
      operationId: finishRegistration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegistrationVerifyRequest"
        required: true
      responses:
        "200":
          description: Registered passkey summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeySummaryResponse"
        "400":
          description: Ceremony is invalid or expired, or the WebAuthn payload is malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "409":
          description: Credential is already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
      security:
      - sessionCookie: []
  /api/auth/passkeys:
    get:
      tags:
      - Auth
      summary: List passkeys
      description: Lists the current authenticated user's passkeys.
      operationId: listPasskeys
      responses:
        "200":
          description: Current user's passkeys.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PasskeySummaryResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
      security:
      - sessionCookie: []
  /api/auth/passkeys/{id}:
    patch:
      tags:
      - Auth
      summary: Rename passkey
      description: Renames a passkey owned by the current authenticated user.
      operationId: renamePasskey
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenamePasskeyRequest"
        required: true
      responses:
        "200":
          description: Updated passkey summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeySummaryResponse"
        "400":
          description: Validation failed for the submitted rename payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Passkey was not found for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Auth
      summary: Delete passkey
      description: Deletes a passkey owned by the current authenticated user.
      operationId: deletePasskey
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Passkey deleted.
        "401":
          description: Missing or invalid JSESSIONID session cookie.
        "404":
          description: Passkey was not found for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - sessionCookie: []
  /api/auth/passkey-login/options:
    post:
      tags:
      - Auth
      summary: Start passkey login
      description: Starts an unauthenticated passkey login ceremony.
      operationId: startPasskeyLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginOptionsRequest"
        required: true
      responses:
        "200":
          description: Passkey login options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyLoginOptionsResponse"
  /api/auth/passkey-login/verify:
    post:
      tags:
      - Auth
      summary: Finish passkey login
      description: Verifies a WebAuthn assertion and creates the normal authenticated session.
      operationId: finishPasskeyLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginVerifyRequest"
        required: true
      responses:
        "200":
          description: Successful passkey login. The response body and session cookie behavior match password login.
          headers:
            Access-Control-Allow-Origin:
              description: Returned for allowed browser origins on cross-origin requests.
              schema:
                type: string
            Access-Control-Allow-Credentials:
              description: Returned as true for allowed browser origins so the session cookie can be stored by the client.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Ceremony is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Assertion is invalid or login is not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot password
      description: Accepts an email address and sends a reset link when the account
        exists. The response is still accepted when the account is missing. The
        reset link carries a one-time token in the token query parameter.
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "400":
          description: Validation failed for the submitted email payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "200":
          description: Request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
  /api/public/ping:
    get:
      tags:
      - Public
      summary: Public ping
      description: Returns a simple public status response so callers can verify that
        the backend is reachable.
      operationId: ping
      responses:
        "200":
          description: Public ping response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicPingResponse"
components:
  schemas:
    SimpleErrorResponse:
      type: object
      description: Simple application-defined error response body.
      properties:
        error:
          type: string
      required:
      - error
    ErrorResponse:
      type: object
      description: Application-defined auth error response body.
      properties:
        error:
          type: string
        code:
          type: string
      required:
      - error
    UpdateProfileRequest:
      type: object
      description: Payload used to update the current authenticated user's profile.
      properties:
        displayName:
          type: string
          description: User-facing display name.
          example: Updated Demo
          maxLength: 120
          minLength: 0
        bio:
          type: string
          description: Short profile biography. Defaults to an empty string when omitted.
          example: Updated from frontend
          maxLength: 600
          minLength: 0
      required:
      - displayName
    UpdateUsernameRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 64
          minLength: 1
      required:
      - username
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          maxLength: 100
          minLength: 8
      required:
      - currentPassword
      - newPassword
    ChangePasswordResponse:
      type: object
      properties:
        changed:
          type: boolean
      required:
      - changed
    RequestEmailChangeRequest:
      type: object
      properties:
        newEmail:
          type: string
          format: email
          maxLength: 255
          minLength: 1
      required:
      - newEmail
    RequestEmailChangeResponse:
      type: object
      properties:
        accepted:
          type: boolean
      required:
      - accepted
    VerifyEmailChangeRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    ProfileResponse:
      type: object
      description: Current authenticated user's profile.
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: demo
        email:
          type: string
          example: demo@example.com
        role:
          type: string
          example: USER
        displayName:
          type: string
          example: Demo User
        bio:
          type: string
          example: Session-backed example profile
      required:
      - bio
      - displayName
      - email
      - id
      - role
      - userId
      - username
    ApiErrorResponse:
      type: object
      description: Framework-generated error response body.
      properties:
        timestamp:
          type: string
          example: 2026-03-20T06:22:13.782Z
        status:
          type: integer
          format: int32
          example: 400
        error:
          type: string
          example: Bad Request
        path:
          type: string
          example: /api/profile/me
      required:
      - error
      - path
      - status
      - timestamp
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          maxLength: 100
          minLength: 8
      required:
      - newPassword
      - token
    ResetPasswordResponse:
      type: object
      properties:
        reset:
          type: boolean
      required:
      - reset
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 64
          minLength: 0
        email:
          type: string
          format: email
          maxLength: 255
          minLength: 0
        password:
          type: string
          maxLength: 100
          minLength: 8
      required:
      - email
      - password
      - username
    RegisterResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
      required:
      - email
      - userId
      - username
    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    VerifyEmailResponse:
      type: object
      properties:
        verified:
          type: boolean
      required:
      - verified
    FreeFormWebAuthnObject:
      type: object
      additionalProperties: true
      description: Browser-generated WebAuthn JSON payload forwarded between frontend and backend.
    PasskeyCredentialDescriptor:
      type: object
      description: Credential descriptor used in WebAuthn option payloads.
      properties:
        type:
          type: string
          example: public-key
        id:
          type: string
          example: base64url-credential-id
        transports:
          type: array
          items:
            type: string
      required:
      - id
      - type
      - transports
    PasskeyPubKeyCredParam:
      type: object
      description: Supported public key credential parameter.
      properties:
        type:
          type: string
          example: public-key
        alg:
          type: integer
          format: int64
          example: -7
      required:
      - alg
      - type
    PasskeyRelyingParty:
      type: object
      description: WebAuthn relying party information.
      properties:
        name:
          type: string
          example: Spring Playground
        id:
          type: string
          example: topilov.dev
      required:
      - name
    PasskeyUserIdentity:
      type: object
      description: WebAuthn user identity information for registration.
      properties:
        id:
          type: string
          example: base64url-user-id
        name:
          type: string
          example: demo
        displayName:
          type: string
          example: Demo User
      required:
      - displayName
      - id
      - name
    PasskeyRegistrationPublicKeyOptions:
      type: object
      description: WebAuthn public key credential creation options.
      properties:
        challenge:
          type: string
          example: base64url-challenge
        rp:
          $ref: "#/components/schemas/PasskeyRelyingParty"
        user:
          $ref: "#/components/schemas/PasskeyUserIdentity"
        pubKeyCredParams:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyPubKeyCredParam"
        timeout:
          type: integer
          format: int64
        excludeCredentials:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyCredentialDescriptor"
        authenticatorSelection:
          type: object
          additionalProperties: true
        attestation:
          type: string
        hints:
          type: array
          items:
            type: string
        extensions:
          type: object
          additionalProperties: true
      required:
      - challenge
      - excludeCredentials
      - extensions
      - hints
      - pubKeyCredParams
      - rp
      - user
    PasskeyAuthenticationPublicKeyOptions:
      type: object
      description: WebAuthn public key credential request options.
      properties:
        challenge:
          type: string
          example: base64url-challenge
        timeout:
          type: integer
          format: int64
        rpId:
          type: string
          example: topilov.dev
        allowCredentials:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyCredentialDescriptor"
        userVerification:
          type: string
          example: preferred
        hints:
          type: array
          items:
            type: string
        extensions:
          type: object
          additionalProperties: true
      required:
      - allowCredentials
      - challenge
      - extensions
      - hints
    ResendVerificationEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          minLength: 1
      required:
      - email
    ResendVerificationEmailResponse:
      type: object
      properties:
        accepted:
          type: boolean
      required:
      - accepted
    PasskeyRegistrationOptionsRequest:
      type: object
      description: Authenticated passkey registration request.
      properties:
        nickname:
          type: string
          example: MacBook Touch ID
          maxLength: 100
      required: []
    PasskeyRegistrationOptionsResponse:
      type: object
      description: Public key credential creation options for authenticated passkey registration.
      properties:
        ceremonyId:
          type: string
          example: ceremony-id
        publicKey:
          $ref: "#/components/schemas/PasskeyRegistrationPublicKeyOptions"
      required:
      - ceremonyId
      - publicKey
    PasskeyRegistrationVerifyRequest:
      type: object
      description: Browser passkey registration result forwarded to the backend.
      properties:
        ceremonyId:
          type: string
          example: ceremony-id
          minLength: 1
        credential:
          $ref: "#/components/schemas/FreeFormWebAuthnObject"
        nickname:
          type: string
          example: MacBook Touch ID
          maxLength: 100
      required:
      - ceremonyId
      - credential
    PasskeySummaryResponse:
      type: object
      description: User-facing passkey summary.
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Work Laptop
        createdAt:
          type: string
          format: date-time
          example: 2026-03-21T10:15:30Z
        lastUsedAt:
          type: string
          format: date-time
          example: 2026-03-21T12:05:00Z
        deviceHint:
          type: string
          example: platform
        transports:
          type: array
          items:
            type: string
      required:
      - createdAt
      - id
      - name
      - transports
    RenamePasskeyRequest:
      type: object
      description: Passkey rename request.
      properties:
        name:
          type: string
          example: Work Laptop
          maxLength: 100
          minLength: 1
      required:
      - name
    PasskeyLoginOptionsRequest:
      type: object
      description: Passkey login options request.
      properties:
        usernameOrEmail:
          type: string
          description: Reserved for future login hints.
      required: []
    PasskeyLoginOptionsResponse:
      type: object
      description: Public key credential request options for passkey login.
      properties:
        ceremonyId:
          type: string
          example: ceremony-id
        publicKey:
          $ref: "#/components/schemas/PasskeyAuthenticationPublicKeyOptions"
      required:
      - ceremonyId
      - publicKey
    PasskeyLoginVerifyRequest:
      type: object
      description: Browser passkey assertion forwarded to the backend for login.
      properties:
        ceremonyId:
          type: string
          example: ceremony-id
          minLength: 1
        credential:
          $ref: "#/components/schemas/FreeFormWebAuthnObject"
      required:
      - ceremonyId
      - credential
    LoginRequest:
      type: object
      description: Credentials used for session-based login.
      properties:
        usernameOrEmail:
          type: string
          description: Username or email address of the user.
          example: demo
          minLength: 1
        password:
          type: string
          description: Plain-text password submitted to the backend for authentication.
          example: demo-password
          minLength: 1
      required:
      - password
      - usernameOrEmail
    LoginResponse:
      type: object
      description: Session login result returned after successful authentication.
      properties:
        authenticated:
          type: boolean
          example: true
        userId:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: demo
        email:
          type: string
          example: demo@example.com
        role:
          type: string
          example: USER
      required:
      - authenticated
      - email
      - role
      - userId
      - username
    TwoFactorLoginChallengeResponse:
      type: object
      description: Password-login step-up response returned when a second factor is required.
      properties:
        requiresTwoFactor:
          type: boolean
          example: true
        loginChallengeId:
          type: string
          example: opaque-login-challenge-id
        methods:
          type: array
          items:
            type: string
          example:
          - TOTP
          - BACKUP_CODE
        expiresAt:
          type: string
          format: date-time
      required:
      - expiresAt
      - loginChallengeId
      - methods
      - requiresTwoFactor
    TwoFactorStatusResponse:
      type: object
      description: Current TOTP two-factor authentication status for the authenticated user.
      properties:
        enabled:
          type: boolean
        pendingSetup:
          type: boolean
        backupCodesRemaining:
          type: integer
          format: int32
        enabledAt:
          type: string
          format: date-time
          nullable: true
      required:
      - backupCodesRemaining
      - enabled
      - pendingSetup
    TwoFactorSetupStartResponse:
      type: object
      description: TOTP setup payload returned before confirmation.
      properties:
        secret:
          type: string
          example: JBSWY3DPEHPK3PXP
        otpauthUri:
          type: string
          example: otpauth://totp/Spring%20Playground:demo%40example.com?secret=JBSWY3DPEHPK3PXP&issuer=Spring%20Playground&algorithm=SHA1&digits=6&period=30
      required:
      - otpauthUri
      - secret
    TwoFactorSetupConfirmRequest:
      type: object
      properties:
        code:
          type: string
          example: "123456"
          pattern: ^\d{6}$
      required:
      - code
    TwoFactorSetupConfirmResponse:
      type: object
      properties:
        enabled:
          type: boolean
          example: true
        backupCodes:
          type: array
          items:
            type: string
          example:
          - ABCD-EFGH-JKLM
          - MNPR-STUV-WXYZ
      required:
      - backupCodes
      - enabled
    RegenerateBackupCodesResponse:
      type: object
      properties:
        backupCodes:
          type: array
          items:
            type: string
          example:
          - ABCD-EFGH-JKLM
          - MNPR-STUV-WXYZ
      required:
      - backupCodes
    DisableTwoFactorResponse:
      type: object
      properties:
        disabled:
          type: boolean
          example: true
      required:
      - disabled
    TwoFactorLoginVerifyRequest:
      type: object
      properties:
        loginChallengeId:
          type: string
          example: opaque-login-challenge-id
        code:
          type: string
          example: "123456"
          pattern: ^\d{6}$
      required:
      - code
      - loginChallengeId
    TwoFactorBackupCodeLoginVerifyRequest:
      type: object
      properties:
        loginChallengeId:
          type: string
          example: opaque-login-challenge-id
        backupCode:
          type: string
          example: ABCD-EFGH-JKLM
      required:
      - backupCode
      - loginChallengeId
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          minLength: 0
      required:
      - email
    ForgotPasswordResponse:
      type: object
      properties:
        accepted:
          type: boolean
      required:
      - accepted
    PublicPingResponse:
      type: object
      description: Simple public reachability response.
      properties:
        status:
          type: string
          example: ok
      required:
      - status
  securitySchemes:
    sessionCookie:
      type: apiKey
      description: Session cookie returned by POST /api/auth/login and sent on protected
        requests.
      name: JSESSIONID
      in: cookie
