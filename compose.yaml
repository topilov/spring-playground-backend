services:
  postgres:
    image: postgres:17-alpine
    container_name: spring-playground-postgres
    environment:
      POSTGRES_DB: spring_playground
      POSTGRES_USER: spring
      POSTGRES_PASSWORD: spring
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spring -d spring_playground"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
